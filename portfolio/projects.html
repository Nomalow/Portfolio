  <style>
    /* ── MODAL PDF ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 860px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
      transform: translateY(20px) scale(0.98);
      transition: transform 0.25s ease;
      overflow: hidden;
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .modal-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-ico {
      width: 40px; height: 40px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .modal-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .modal-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .modal-close {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
      background: var(--light);
      position: relative;
      min-height: 400px;
    }

    .modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .modal-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .modal-loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .modal-footer {
      padding: 14px 24px;
      border-top: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--bg);
    }

    .modal-stack { display: flex; gap: 6px; flex-wrap: wrap; }

    .modal-status {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .status-done { background: var(--green-light); color: var(--green); }
    .status-wip  { background: #fef9c3; color: #a16207; }

    /* Empêche le scroll du body quand modal ouverte */
    body.modal-open { overflow: hidden; }
  </style>
</head>
