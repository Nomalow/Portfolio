  <div class="page-wrapper">
    <div class="container">

      <div class="page-header reveal">
        <p class="section-label">Projets</p>
        <h1>Ce que j'ai construit</h1>
        <p class="page-subtitle">Cliquez sur un projet pour voir la documentation PDF.</p>
      </div>

      <div class="filter-bar reveal">
        <button class="filter-btn active" data-filter="all">Tous</button>
        <button class="filter-btn" data-filter="web">Web</button>
        <button class="filter-btn" data-filter="ia">IA</button>
        <button class="filter-btn" data-filter="mobile">Mobile</button>
      </div>

      <div class="projects-grid">

        <button class="project-card reveal" data-cat="web"
          data-name="E-Commerce App" data-ico="🛒"
          data-pdf="pdfs/ecommerce.pdf"
          data-stack="React,Node.js,MongoDB" data-status="done">
          <div class="proj-top">
            <div class="proj-ico">🛒</div>
            <span class="proj-arrow">↗</span>
          </div>
          <p class="proj-name">E-Commerce App</p>
          <p class="proj-desc">Plateforme de vente en ligne avec gestion des stocks, paiement Stripe intégré et tableau de bord admin en temps réel.</p>
          <div class="proj-footer">
            <div class="proj-stack">
              <span class="stack-tag">React</span>
              <span class="stack-tag">Node.js</span>
              <span class="stack-tag">MongoDB</span>
            </div>
            <span class="proj-status status-done">✓ Terminé</span>
          </div>
        </button>

        <button class="project-card reveal" data-cat="ia"
          data-name="Chatbot IA" data-ico="🤖"
          data-pdf="pdfs/chatbot.pdf"
          data-stack="Python,FastAPI,OpenAI" data-status="done">

            <div class="proj-ico">🤖</div>
            <span class="proj-arrow">↗</span>
          </div>
          <p class="proj-name">Chatbot IA</p>
          <p class="proj-desc">Assistant conversationnel qui répond aux questions sur une base de connaissances personnalisée grâce à un LLM.</p>

            <div class="proj-stack">
              <span class="stack-tag">Python</span>
              <span class="stack-tag">FastAPI</span>
              <span class="stack-tag">OpenAI</span>
            </div>
            <span class="proj-status status-done">✓ Terminé</span>
          </div>
        </button>

        <button class="project-card reveal" data-cat="web"
          data-name="Dashboard Analytics" data-ico="📊"
          data-pdf="pdfs/dashboard.pdf"
          data-stack="Vue.js,D3.js,PostgreSQL" data-status="done">
          <div class="proj-top">
            <div class="proj-ico">📊</div>
            <span class="proj-arrow">↗</span>
          </div>
          <p class="proj-name">Dashboard Analytics</p>
          <p class="proj-desc">Tableau de bord interactif pour visualiser des métriques métier avec graphiques dynamiques et filtres avancés.</p>
          <div class="proj-footer">
            <div class="proj-stack">
              <span class="stack-tag">Vue.js</span>
              <span class="stack-tag">D3.js</span>
              <span class="stack-tag">PostgreSQL</span>
            </div>
            <span class="proj-status status-done">✓ Terminé</span>
          </div>
        </button>

        <button class="project-card reveal" data-cat="web"
          data-name="Auth System" data-ico="🔐"
          data-pdf="pdfs/auth.pdf"
          data-stack="Express,JWT,Docker" data-status="done">
          <div class="proj-top">
            <div class="proj-ico">🔐</div>
            <span class="proj-arrow">↗</span>
          </div>
          <p class="proj-name">Auth System</p>
          <p class="proj-desc">Système d'authentification sécurisé avec JWT, OAuth2, double authentification et gestion des rôles.</p>
          <div class="proj-footer">
            <div class="proj-stack">

              <span class="stack-tag">Docker</span>

            <span class="proj-status status-done">✓ Terminé</span>
          </div>

        <button class="project-card reveal" data-cat="mobile"
          data-name="App Mobile Todo" data-ico="📱"
          data-pdf="pdfs/todo.pdf"
          data-stack="React Native,Firebase" data-status="wip">
          <div class="proj-top">
            <div class="proj-ico">📱</div>
            <span class="proj-arrow">↗</span>
          </div>
          <p class="proj-name">App Mobile Todo</p>
          <p class="proj-desc">Application mobile de gestion de tâches avec synchronisation cloud, notifications et mode hors-ligne.</p>
          <div class="proj-footer">
            <div class="proj-stack">
              <span class="stack-tag">React Native</span>
              <span class="stack-tag">Firebase</span>
            </div>
            <span class="proj-status status-wip">⏳ En cours</span>

        <button class="project-card reveal" data-cat="ia"

            <div class="proj-ico">🔍</div>

              <span class="stack-tag">scikit-learn</span>
              <span class="stack-tag">Pandas</span>

      <footer><p>Fait avec ❤️ par <a href="index.html">Prénom Nom</a> · 2025</p></footer>

  <!-- ── MODALE PDF ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">

      <div class="modal-header">
        <div class="modal-title">
          <div class="modal-ico" id="modalIco"></div>
          <span class="modal-name" id="modalName"></span>
        </div>
        <div class="modal-actions">
          <a href="#" class="modal-btn" id="modalDownload" download>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9"  y1="15" x2="15" y2="15"/>
            </svg>
            Télécharger
          </a>
          <button class="modal-close" id="modalClose">✕</button>
        </div>
      </div>

      <div class="modal-body">
        <div class="modal-loading" id="modalLoading">
          <div class="modal-loading-spinner"></div>
          <span>Chargement du PDF…</span>
        </div>
        <div class="modal-error" id="modalError">
          <span class="modal-error-ico">📂</span>
          <p class="modal-error-title">PDF introuvable</p>
          <p class="modal-error-desc">
            Ajoute le fichier dans le dossier
            <code>pdfs/</code> de ton repo GitHub.
          </p>
        </div>
        <iframe id="modalIframe" title="Aperçu PDF"></iframe>
      </div>

      <div class="modal-footer">
        <div class="modal-stack" id="modalStack"></div>
        <span class="modal-status" id="modalStatus"></span>
      </div>

    </div>
  </div>

  <script src="js/projects.js"></script>
